<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}RAG Chatbot{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- 🔝 NAVBAR -->
<div class="navbar">
    <div class="nav-left">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <h2>ChatPDF</h2>
    </div>

    <div class="nav-right">
        {% if session.get("user_id") %}
            <a href="/logout">Logout</a>
        {% else %}
            <a href="/login">Login</a>
            <a href="/register">Signup</a>
        {% endif %}
    </div>
</div>

<div class="container" id="container">

    {% if session.get("user_id") %}


        <aside class="sidebar" id="sidebar">


        <!-- UPLOAD BOX -->
        <form method="POST" enctype="multipart/form-data" class="upload-box">
            <input type="file" name="pdf_file">
            <button type="submit" class="upload-btn">Upload</button>
        </form>
      
        <hr>

        <p class="sidebar-text">
            Upload your file here and start chat.
        </p>
          <form action="/clear_chat" method="POST"
            onsubmit="return confirm('Are you sure you want to delete all chat history?');">
            <button type="submit" class="clear-chat-btn">
                Clear Chat
            </button>
        </form>

        <!-- USER -->
        <div class="sidebar-user">
            <div class="user-avatar">
                {{ session.get('username', 'G')[0].upper() }}
            </div>
            <div class="user-info">
                <span>{{ session.get('username', 'Guest') }}</span>
            </div>
        </div>

    </aside>

    {% endif %}

    <!-- Main Content -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

</div>


<script>
function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("active");
    document.getElementById("container").classList.toggle("sidebar-open");
}
</script>
</body>
</html>
